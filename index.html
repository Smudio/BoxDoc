<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BoxDoc</title>
    <link data-trunk rel="rust" data-bin="boxdoc" data-type="main" data-wasm-opt="z" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100%;
        height: 100%;
        background: #2a282e;
        overscroll-behavior: none;
      }
      #the_canvas_id {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #aaa;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="loading" id="loading">BoxDoc wird geladen…</div>
    <canvas id="the_canvas_id"></canvas>
    <script>
      window.addEventListener('load', function() {
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      });
    </script>
  </body>
</html>
